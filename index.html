<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진영 유치원 입급 확인 시스템</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
        }
        #display-area {
            text-align: center;
            transition: all 0.5s;
        }
        .child-name {
            font-size: 15rem; 
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .message {
            font-size: 3rem;
            color: #34495e;
        }
        .warning { color: #e74c3c; font-size: 5rem; }
    </style>
</head>
<body>

    <div id="display-area">
        <div class="message">티켓 바코드를 찍어주세요!</div>
    </div>

    <script>
        let studentData = [];
        let inputBuffer = "";

        // 1. 데이터베이스 로드
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                studentData = data;
                console.log("데이터 로드 완료");
            })
            .catch(err => {
                console.error("파일을 찾을 수 없습니다:", err);
                alert("data.json 파일을 찾을 수 없습니다. 경로를 확인해주세요.");
            });

        // 2. 바코드 리더기 입력 감지
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (inputBuffer.length > 0) {
                    processBarcode(inputBuffer.trim());
                    inputBuffer = ""; 
                }
            } else {
                // 한글 입력 방지 및 일반 문자열만 버퍼에 추가
                if(e.key.length === 1) inputBuffer += e.key;
            }
        });

        // 3. 바코드 처리 로직
        function processBarcode(barcode) {
            const displayArea = document.getElementById('display-area');
            
            // 입력받은 값에서 숫자만 추출 (예: *2026001* 이나 2026001 모두 2026001로 변환)
            const cleanInput = barcode.replace(/[^0-9]/g, ""); 
            
            // 데이터베이스에서 일치하는 학생 찾기
            const student = studentData.find(s => {
                // DB의 바코드 값에서도 숫자만 추출하여 비교
                const cleanDataBarcode = String(s["barcode (A열)"]).replace(/[^0-9]/g, "");
                return cleanDataBarcode === cleanInput;
            });

            if (!student) {
                renderMessage("<div class='warning'>등록되지 않은<br>티켓입니다 😭</div>");
                resetScreen(3000); // 3초 뒤 초기화
            } else if (student["used (C열)"] === true) {
                renderMessage(`<div class="child-name" style="font-size:8rem;">${student["name (B열)"]}</div><div class='warning'>이미 입장 확인되었습니다!</div>`);
                resetScreen(3000);
            } else {
                // 성공: 사용 처리 및 이름 출력
                student["used (C열)"] = true;
                renderMessage(`
                    <div class="child-name">${student["name (B열)"]}</div>
                    <div class="message">어서오세요! 환영합니다 ✨</div>
                `);
                
                resetScreen(5000); // 5초 뒤 초기화
            }
        }

        function renderMessage(html) {
            document.getElementById('display-area').innerHTML = html;
        }

        function resetScreen(delay) {
            setTimeout(() => {
                renderMessage("<div class='message'>티켓 바코드를 찍어주세요!</div>");
            }, delay);
        }
    </script>
</body>
</html>
