<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진영 유치원 입급 확인 시스템</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }
        #display-area {
            text-align: center;
            transition: all 0.3s ease;
        }
        .child-name {
            font-size: 12rem; 
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .message {
            font-size: 3rem;
            color: #34495e;
        }
        .warning { color: #e74c3c; font-size: 4rem; font-weight: bold; }
        
        /* 하단에 데이터 로딩 상태 표시 (태블릿 확인용) */
        #status-bar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div id="display-area">
        <div class="message">데이터를 불러오는 중입니다...</div>
    </div>
    
    <div id="status-bar" id="status">상태: 대기 중</div>

    <script>
        let studentData = [];
        let inputBuffer = "";
        const displayArea = document.getElementById('display-area');
        const statusBar = document.getElementById('status-bar');

        // 1. 데이터베이스 로드 (캐시 방지 파라미터 추가)
        // 파일명 뒤에 ?v= + 타임스탬프를 붙여 브라우저가 항상 새 파일을 읽게 합니다.
        fetch(`data.json?v=${new Date().getTime()}`)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP 에러! 상태: ${res.status}`);
                return res.json();
            })
            .then(data => {
                studentData = data;
                renderMessage("<div class='message'>티켓 바코드를 찍어주세요!</div>");
                statusBar.innerText = `상태: 연결 성공 (데이터 ${data.length}건)`;
            })
            .catch(err => {
                console.error("파일 로드 실패:", err);
                renderMessage(`<div class='warning'>데이터 로드 실패 😭<br><span style='font-size:1.5rem;'>${err.message}</span></div>`);
                statusBar.innerText = `상태: 오류 발생`;
            });

        // 2. 바코드 리더기 입력 감지
        window.addEventListener('keydown', (e) => {
            // 한글 입력기(IME) 과정에서 발생하는 Enter 중복 방지
            if (e.isComposing) return;

            if (e.key === 'Enter') {
                if (inputBuffer.length > 0) {
                    processBarcode(inputBuffer.trim());
                    inputBuffer = ""; 
                }
            } else {
                // 숫자와 문자열만 버퍼에 추가
                if(e.key.length === 1) inputBuffer += e.key;
            }
        });

        // 3. 바코드 처리 로직
        function processBarcode(barcode) {
            // 입력값과 DB값 모두 숫자만 남겨서 비교 (특수문자 * 제거)
            const cleanInput = barcode.replace(/[^0-9]/g, ""); 
            
            const student = studentData.find(s => {
                const cleanDataBarcode = String(s["barcode (A열)"]).replace(/[^0-9]/g, "");
                return cleanDataBarcode === cleanInput;
            });

            if (!student) {
                renderMessage("<div class='warning'>등록되지 않은<br>티켓입니다 😭</div>");
                resetScreen(3000);
            } else if (student["used (C열)"] === true) {
                renderMessage(`
                    <div class="child-name" style="font-size:8rem; color:#e67e22;">${student["name (B열)"]}</div>
                    <div class='warning' style="font-size:3rem;">이미 입장 확인되었습니다!</div>
                `);
                resetScreen(3000);
            } else {
                student["used (C열)"] = true;
                renderMessage(`
                    <div class="child-name">${student["name (B열)"]}</div>
                    <div class="message">어서오세요! 환영합니다 ✨</div>
                `);
                resetScreen(10000); 
            }
        }

        function renderMessage(html) {
            displayArea.innerHTML = html;
        }

        function resetScreen(delay) {
            setTimeout(() => {
                renderMessage("<div class='message'>티켓 바코드를 찍어주세요!</div>");
            }, delay);
        }
    </script>
</body>
</html>
