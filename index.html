<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진영 유치원 입급 확인 시스템</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
        }
        #display-area {
            text-align: center;
            transition: all 0.5s;
        }
        .child-name {
            font-size: 15rem; 
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .message {
            font-size: 3rem;
            color: #34495e;
        }
        .warning { color: #e74c3c; font-size: 5rem; }
    </style>
</head>
<body>

    <div id="display-area">
        <div class="message">티켓 바코드를 찍어주세요!</div>
    </div>

    <script>
        let studentData = [];
        let inputBuffer = "";

        // 1. 데이터베이스 로드 (업로드하신 파일명과 정확히 일치시켰습니다)
        fetch('엑셀을 JSON 데이터베이스로 활용하기.json')
            .then(res => res.json())
            .then(data => {
                studentData = data;
                console.log("데이터 로드 완료");
            })
            .catch(err => console.error("파일을 찾을 수 없습니다. 파일명을 확인해주세요."));

        // 2. 바코드 리더기 입력 감지
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                processBarcode(inputBuffer.trim());
                inputBuffer = ""; 
            } else {
                if(e.key.length === 1) inputBuffer += e.key;
            }
        });

        // 3. 바코드 처리 로직 (별표 제거 로직 포함)
        function processBarcode(barcode) {
            const displayArea = document.getElementById('display-area');
            
            // 입력값과 데이터값 모두에서 별표(*)를 제거하고 숫자만 비교합니다.
            const cleanInput = barcode.replace(/\*/g, ""); 
            
            const student = studentData.find(s => {
                const cleanDataBarcode = String(s["barcode (A열)"]).replace(/\*/g, "");
                return cleanDataBarcode === cleanInput;
            });

            if (!student) {
                renderMessage("<div class='warning'>등록되지 않은<br>티켓입니다 😭</div>");
            } else if (student["used (C열)"]) {
                renderMessage(`<div class='warning'>${student["name (B열)"]} 어린이는<br>이미 입장했어요!</div>`);
            } else {
                // 성공: 사용 처리 및 이름 출력
                student["used (C열)"] = true;
                renderMessage(`
                    <div class="child-name">${student["name (B열)"]}</div>
                    <div class="message">어서오세요! 환영합니다 ✨</div>
                `);
                
                // 5초 뒤에 다시 대기 화면으로 전환
                setTimeout(() => {
                    renderMessage("<div class='message'>티켓 바코드를 찍어주세요!</div>");
                }, 5000);
            }
        }

        function renderMessage(html) {
            document.getElementById('display-area').innerHTML = html;
        }
    </script>
</body>
</html>
